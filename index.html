<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PING Wallet</title>
    <!-- Подключаем Telegram SDK -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #141416;
            color: #ffffff;
            margin: 0;
            padding: 16px;
        }
        /* Шапка в стиле Tonkeeper */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #2c2c2e;
            object-fit: cover;
        }
        .username {
            font-size: 16px;
            font-weight: 600;
        }
        /* Главный баланс сверху */
        .total-balance-container {
            text-align: center;
            margin-bottom: 32px;
        }
        .total-title {
            color: #8e8e93;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .total-amount {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        /* Список активов */
        .assets-list {
            background-color: #1c1c1e;
            border-radius: 16px;
            padding: 8px 16px;
        }
        .asset-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2c2c2e;
        }
        .asset-item:last-child {
            border-bottom: none;
        }
        .asset-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .asset-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        .asset-name {
            font-size: 16px;
            font-weight: 500;
        }
        .asset-right {
            text-align: right;
        }
        .crypto-amount {
            font-size: 16px;
            font-weight: 600;
        }
        .usd-amount {
            font-size: 13px;
            color: #8e8e93;
        }
    </style>
</head>
<body>

    <!-- Шапка профиля -->
    <div class="header">
        <div class="user-info">
            <span class="username" id="user-name">Loading...</span>
        </div>
        <!-- Аватарка в правом верхнем углу -->
        <img src="" alt="Avatar" class="avatar" id="user-avatar" style="display: none;">
    </div>

    <!-- Крупные цифры баланса сверху как в Тонкипере -->
    <div class="total-balance-container">
        <div class="total-title">Total Balance</div>
        <div class="total-amount" id="main-balance">$0.00</div>
    </div>

    <!-- Список крипто-валют (Тон, Юсдт, Бтц) -->
    <h3 style="font-size: 18px; margin-bottom: 12px; padding-left: 4px;">Assets</h3>
    <div class="assets-list">
        <!-- TON -->
        <div class="asset-item">
            <div class="asset-left">
                <div class="asset-icon" style="background-color: #0088cc; color: white;">💎</div>
                <div class="asset-name">Toncoin</div>
            </div>
            <div class="asset-right">
                <div class="crypto-amount" id="ton-balance">0 TON</div>
                <div class="usd-amount" id="ton-usd">$0.00</div>
            </div>
        </div>
        <!-- USDT -->
        <div class="asset-item">
            <div class="asset-left">
                <div class="asset-icon" style="background-color: #26a17b; color: white;">💵</div>
                <div class="asset-name">Tether</div>
            </div>
            <div class="asset-right">
                <div class="crypto-amount" id="usdt-balance">0 USDT</div>
                <div class="usd-amount" id="usdt-usd">$0.00</div>
            </div>
        </div>
        <!-- BTC -->
        <div class="asset-item">
            <div class="asset-left">
                <div class="asset-icon" style="background-color: #f7931a; color: white;">₿</div>
                <div class="asset-name">Bitcoin</div>
            </div>
            <div class="asset-right">
                <div class="crypto-amount" id="btc-balance">0 BTC</div>
                <div class="usd-amount" id="btc-usd">$0.00</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        if (user) {
            // Вывод никнейма по центру/левее шапки
            document.getElementById('user-name').innerText = user.username ? `@${user.username}` : user.first_name;
            
            // Если у пользователя загружена аватарка в профиле Telegram Web App
            if (user.photo_url) {
                const avatarImg = document.getElementById('user-avatar');
                avatarImg.src = user.photo_url;
                avatarImg.style.display = 'block';
            }

            // Логика распределения баланса по ID
            if (user.id === 8455479648) {
                // Баланс создателя: 5 000 000 долларов в сумме
                document.getElementById('main-balance').innerText = "$5,000,000.00";
                
                document.getElementById('ton-balance').innerText = "150,000.00 TON";
                document.getElementById('ton-usd').innerText = "$1,000,000.00";
                
                document.getElementById('usdt-balance').innerText = "3,000,000.00 USDT";
                document.getElementById('usdt-usd').innerText = "$3,000,000.00";
                
                document.getElementById('btc-balance').innerText = "14.2857 BTC";
                document.getElementById('btc-usd').innerText = "$1,000,000.00";
            } else {
                // Баланс обычного пользователя
                document.getElementById('main-balance').innerText = "$0.00";
                document.getElementById('ton-balance').innerText = "0 TON";
                document.getElementById('ton-usd').innerText = "$0.00";
                document.getElementById('usdt-balance').innerText = "0 USDT";
                document.getElementById('usdt-usd').innerText = "$0.00";
                document.getElementById('btc-balance').innerText = "0 BTC";
                document.getElementById('btc-usd').innerText = "$0.00";
            }
        }
    </script>
</body>
</html>
