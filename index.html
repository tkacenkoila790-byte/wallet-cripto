<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PING Wallet</title>
    <!-- Подключаем Telegram SDK -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #141416;
            color: #ffffff;
            margin: 0;
            padding: 16px;
        }
        /* Шапка в стиле Tonkeeper */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #2c2c2e;
            object-fit: cover;
        }
        .username {
            font-size: 16px;
            font-weight: 600;
        }
        /* Главный баланс сверху */
        .total-balance-container {
            text-align: center;
            margin-bottom: 32px;
        }
        .total-title {
            color: #8e8e93;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .total-amount {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        /* Список активов */
        .assets-list {
            background-color: #1c1c1e;
            border-radius: 16px;
            padding: 8px 16px;
        }
        .asset-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2c2c2e;
        }
        .asset-item:last-child {
            border-bottom: none;
        }
        .asset-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .asset-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }
        .asset-name {
            font-size: 16px;
            font-weight: 500;
        }
        .asset-right {
            text-align: right;
        }
        .crypto-amount {
            font-size: 16px;
            font-weight: 600;
        }
        .usd-amount {
            font-size: 13px;
            color: #8e8e93;
        }
    </style>
</head>
<body>

    <!-- Шапка профиля -->
    <div class="header">
        <div class="user-info">
            <span class="username" id="user-name">Loading...</span>
        </div>
        <!-- Аватарка в правом верхнем углу -->
        <img src="" alt="Avatar" class="avatar" id="user-avatar" style="display: none;">
    </div>

    <!-- Крупные цифры баланса сверху как в Тонкипере -->
